<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance — MyApp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }
    .card {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 480px;
    }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 0.75rem; }
    p { color: #888; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔧</div>
    <h1>Maintenance en cours</h1>
    <p>L'application est temporairement indisponible.<br />Revenez dans quelques instants.</p>
  </div>
</body>
</html>
